# Photo Pose Detector Dataset
# YOLO26-pose configuration for 4-corner keypoint detection

path: /Users/krys.petrie/dev/photo-pose-detector/data
train: images/train
val: images/val

# Number of classes
nc: 1

# Class names
names:
  0: photo

# Keypoint configuration (4 corners: TL, TR, BR, BL)
kpt_shape: [4, 2]  # 4 keypoints, each with x,y coordinates
flip_idx: [1, 0, 3, 2]  # Horizontal flip: TL<->TR, BR<->BL

# Pose-specific configuration
pose:
  flip_idx: [1, 0, 3, 2]
