# YOLO Detection Dataset Configuration — Fiducial Corner Detection
# =====================================================================
# Single model with 4 classes for corner orientation detection.
#
# Each image is a 640×640 crop centered near a corner of a photo.
# The model detects the corner as a bounding box and classifies its
# orientation based on the L-shaped photo/background boundary.
#
# Classes:
#   0: UL (┏) — photo extends right + down
#   1: UR (┓) — photo extends left + down
#   2: LL (┗) — photo extends right + up
#   3: LR (┛) — photo extends left + up
#
# NO FLIP AUGMENTATION: flipping would change the corner orientation,
# converting a UL corner into UR or LL, which would be mislabeled.
#
# Label format: Standard YOLO detection (5 columns per object)
#   class_id x_center y_center width height
#
# Usage:
#   python3 train_fiducial.py

path: /Users/krys.petrie/dev/photo-pose-detector/data_fiducial
train: images/train
val: images/val

nc: 4
names:
  0: ul
  1: ur
  2: ll
  3: lr