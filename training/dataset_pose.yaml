# YOLO Pose Dataset Configuration
# ===============================
# For training the YOLO Pose Model (4 corner keypoints)
#
# This dataset uses the SAME images as the detection dataset, but with
# DIFFERENT labels that include 4 keypoint coordinates per object.
#
# FORMAT: YOLO-pose (13 columns per object)
#   class_id x_center y_center width height kp0x kp0y kpc0 kp1x kp1y kpc1 kp2x kp2y kpc2 kp3x kp3y kpc3
#
# KEYPOINT ORDER: LL, UL, UR, LR (CRITICAL)
#   kp0 = Lower-Left (LL)  - minimum Y, minimum X
#   kp1 = Upper-Left (UL)  - maximum Y, minimum X
#   kp2 = Upper-Right (UR) - maximum Y, maximum X
#   kp3 = Lower-Right (LR) - minimum Y, maximum X
#
# Usage:
#   from ultralytics import YOLO
#   model = YOLO('yolo26n-pose.pt')
#   results = model.train(data='dataset_pose.yaml', ...)

# Path to dataset root (relative to this file or absolute)
path: /Users/krys.petrie/dev/photo-pose-detector/data

# Training and validation image directories
train: images/train
val: images/val

# Number of classes
nc: 1

# Class names
names:
  0: photo

# -----------------------------------------------------------------------------
# POSE CONFIGURATION (REQUIRED for pose training)
# -----------------------------------------------------------------------------

# Number of keypoints per object
kpt_number: 4

# Keypoint dimensions (x, y) - always 2 for 2D keypoints
kpt_shape: [4, 2]

# Flip index for horizontal flip augmentation
# When image is horizontally flipped:
#   - LL (kp0) ↔ LR (kp3)  [left-right swap]
#   - UL (kp1) ↔ UR (kp2)  [left-right swap]
# This enables proper keypoint tracking through flip augmentation
flip_idx: [2, 3, 0, 1]

# Keypoint names (for documentation, not used by training)
keypoint_names:
  - lower_left
  - upper_left
  - upper_right
  - lower_right

# -----------------------------------------------------------------------------
# MODEL PURPOSE
# -----------------------------------------------------------------------------
# This model detects 4 corner keypoints of photographs in images.
# It outputs a quadrilateral defined by LL, UL, UR, LR corners.
#
# Use case:
#   - Precise corner detection for photo extraction
#   - Perspective correction using detected quadrilateral
#   - Final corner localization in a pipeline
#
# Training notes:
#   - YOLO-pose model required
#   - flip_idx must be set correctly for augmentation
#   - Disable aggressive augmentation that moves keypoints
#   - mosaic=0.5, degrees=10, scale=0.3 recommended
# -----------------------------------------------------------------------------
