# YOLO Pose Dataset Configuration
# ===============================
# Self-contained pose dataset — no symlinks needed.
#
# Label format: YOLO-pose (17 columns per object)
#   class_id x_center y_center width height kp0x kp0y kp0v kp1x kp1y kp1v kp2x kp2y kp2v kp3x kp3y kp3v
#
# KEYPOINT ORDER: LL, UL, UR, LR (CRITICAL)
#   kp0 = Lower-Left (LL)  - high Y, low X
#   kp1 = Upper-Left (UL)  - low Y, low X
#   kp2 = Upper-Right (UR) - low Y, high X
#   kp3 = Lower-Right (LR) - high Y, high X
#
# Training data: single-photo crops with keypoints at full image extent
# (matches the detection→pose inference pipeline).
#
# Usage:
#   python3 train_pose.py
#   (or explicitly: python3 train_pose.py --data dataset_pose.yaml)

path: /Users/krys.petrie/dev/photo-pose-detector/data_pose
train: images/train
val: images/val

nc: 1
names:
  0: photo

# Keypoint configuration
kpt_shape: [4, 3]
flip_idx: [3, 2, 1, 0]