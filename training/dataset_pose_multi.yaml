# YOLO Pose Dataset Configuration — Multi-Photo Scenes
# =====================================================
# Self-contained pose dataset with 1–4 photos per image.
# This is the "original-style" distribution (same as detection model)
# but with keypoint labels, to test whether the V1 pose model's failure
# was caused by configuration bugs rather than distribution mismatch.
#
# Label format: YOLO-pose (17 columns per object)
#   class_id x_center y_center width height kp0x kp0y kp0v kp1x kp1y kp1v kp2x kp2y kp2v kp3x kp3y kp3v
#
# KEYPOINT ORDER: LL, UL, UR, LR (CRITICAL)
#   kp0 = Lower-Left (LL)  - high Y, low X
#   kp1 = Upper-Left (UL)  - low Y, low X
#   kp2 = Upper-Right (UR) - low Y, high X
#   kp3 = Lower-Right (LR) - high Y, high X
#
# Horizontal flip mapping: LL↔LR, UL↔UR (flip_idx: [3, 2, 1, 0])
#
# V2 Bug fixes applied (vs the old dataset.yaml):
#   - kpt_shape: [4, 3] (was [4, 2] — read garbage keypoint coords)
#   - flip_idx: [3, 2, 1, 0] (was [1, 0, 3, 2] — wrong keypoint swaps)
#
# Usage:
#   python3 train_pose_multi.py
#   (or explicitly: python3 train_pose_multi.py --data dataset_pose_multi.yaml)

path: /Users/krys.petrie/dev/photo-pose-detector/data_pose_multi
train: images/train
val: images/val

nc: 1
names:
  0: photo

# Keypoint configuration
kpt_shape: [4, 3]
flip_idx: [3, 2, 1, 0]